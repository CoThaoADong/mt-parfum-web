<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ — MT Parfum</title>
  <meta name="description" content="Liên hệ MT Parfum — tư vấn mùi hương, đặt hàng và hợp tác.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mtparfum.vn/contact">
  <meta property="og:site_name" content="MT Parfum">
  <meta property="og:title" content="Liên hệ — MT Parfum">
  <meta property="og:description" content="Liên hệ MT Parfum — tư vấn mùi hương, đặt hàng và hợp tác.">
  <meta property="og:image" content="https://mtparfum.vn/assets/images/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Liên hệ — MT Parfum">
  <meta name="twitter:description" content="Liên hệ MT Parfum — tư vấn mùi hương, đặt hàng và hợp tác.">
  <meta name="twitter:image" content="https://mtparfum.vn/assets/images/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">

  <section class="page-hero">
    <div class="wrap reveal">
      <span class="eyebrow">Kết nối</span>
      <h1>Liên hệ</h1>
      <p>Chúng tôi luôn sẵn lòng đồng hành cùng bạn trên hành trình tìm mùi hương của riêng mình.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="contact-grid">
        <div class="reveal">
          <h2 style="font-size:32px;margin-bottom:20px">Thông tin liên hệ</h2>
          <div id="contactInfo"></div>
          <p style="margin-top:26px;color:var(--muted);font-size:13px">Giờ làm việc: 8:30 – 21:00, tất cả các ngày trong tuần.</p>
        </div>
        <div class="reveal d1">
          <h2 style="font-size:32px;margin-bottom:20px">Gửi tin nhắn</h2>
          <form onsubmit="return sendContact(event)">
            <div class="field"><label>Họ và tên</label><input type="text" required placeholder="Nguyễn Văn A"></div>
            <div class="field"><label>Số điện thoại / Email</label><input type="text" required placeholder="0909..."></div>
            <div class="field"><label>Nội dung</label><textarea rows="5" required placeholder="Bạn cần tư vấn điều gì?"></textarea></div>
            <button class="btn btn--solid btn--block" type="submit">Gửi liên hệ</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/site.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      qs("#contactInfo").innerHTML = `
        <div class="info-line">${IC.pin}<div><b>Địa chỉ</b><span>${SITE.address}</span></div></div>
        <div class="info-line">${IC.phone}<div><b>Điện thoại</b><span>${SITE.phone}</span></div></div>
        <div class="info-line">${IC.mail}<div><b>Email</b><span>${SITE.email}</span></div></div>
        <div class="info-line">${IC.leaf}<div><b>Nhà sản xuất</b><span>${SITE.company}</span></div></div>`;
    });
    function sendContact(e){ e.preventDefault(); e.target.reset(); toast("Cảm ơn bạn! Chúng tôi sẽ liên hệ lại sớm nhất."); return false; }
  </script>
</body>
</html>
